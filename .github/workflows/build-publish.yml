name: Build and Publish Docker Image

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      PRIVATE_REGISTRY_URL: ${{ secrets.PRIVATE_REGISTRY_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        # Authenticate with Docker Hub only if the required secrets are present
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Log in to Private Registry
        # Authenticate with a private registry only if URL, username, and password secrets are provided
        if: env.PRIVATE_REGISTRY_URL != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.PRIVATE_REGISTRY_URL }}
          username: ${{ secrets.PRIVATE_REGISTRY_USERNAME }}
          password: ${{ secrets.PRIVATE_REGISTRY_PASSWORD }}

      - name: Determine Image Names
        id: image-names
        run: |
          echo "images<<EOF" >> $GITHUB_OUTPUT
          echo "ghcr.io/${{ github.repository }}" >> $GITHUB_OUTPUT
          # Configure Docker Hub image name
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            if [ -n "${{ secrets.DOCKERHUB_REPOSITORY }}" ]; then
              echo "${{ secrets.DOCKERHUB_REPOSITORY }}" >> $GITHUB_OUTPUT
            else
              echo "${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
            fi
          fi
          # Configure Private Registry image name
          if [ -n "${{ secrets.PRIVATE_REGISTRY_URL }}" ]; then
            if [ -n "${{ secrets.PRIVATE_REGISTRY_REPOSITORY }}" ]; then
              echo "${{ secrets.PRIVATE_REGISTRY_URL }}/${{ secrets.PRIVATE_REGISTRY_REPOSITORY }}" >> $GITHUB_OUTPUT
            else
              echo "${{ secrets.PRIVATE_REGISTRY_URL }}/${{ secrets.PRIVATE_REGISTRY_USERNAME }}/${{ github.event.repository.name }}" >> $GITHUB_OUTPUT
            fi
          fi
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-names.outputs.images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
