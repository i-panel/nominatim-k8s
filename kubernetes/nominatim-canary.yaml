apiVersion: v1
kind: Service
metadata:
  name: nominatim
spec:
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: nominatim
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nominatim-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nominatim
      track: canary
  template:
    metadata:
      labels:
        app: nominatim
        track: canary
    spec:
      # Uncomment the following lines if using a private registry that requires authentication
      # imagePullSecrets:
      # - name: private-registry-auth
      containers:
      - name: nominatim-k8s
        # Default to GitHub Container Registry. Change YOUR_GITHUB_USERNAME or use your private registry URL.
        image: ghcr.io/YOUR_GITHUB_USERNAME/nominatim-k8s:latest
        env:
        - name: NOMINATIM_MODE
          value: CREATE
        - name: NOMINATIM_PBF_URL
          value: "http://download.geofabrik.de/asia/maldives-latest.osm.pbf"
        - name: NOMINATIM_DATA_LABEL
          value: maldives-20161213
        - name: NOMINATIM_AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: nominatim-storage-secret
              key: access-key-id
        - name: NOMINATIM_AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: nominatim-storage-secret
              key: secret-access-key
        - name: NOMINATIM_AWS_REGION
          value: "ir-thr-at1"
        - name: NOMINATIM_S3_BUCKET
          value: "my-bucket"
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /search
            port: 8080
          initialDelaySeconds: 30
          timeoutSeconds: 1